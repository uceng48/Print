name: Build Electron App (Windows)

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:   # tombol manual di GitHub

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build Electron app (Windows)
        run: npm run build -- --win --x64
        # --win --x64 akan menghasilkan installer (NSIS) dan portable
        # karena di package.json sudah diatur target: ["nsis", "portable"]

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ThinkFlow-Build
          path: dist/*.exe
          if-no-files-found: error
